<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{width:360px;font-family:-apple-system,'Segoe UI',sans-serif;background:#0a0a0a;color:#e8e8e8;overflow:hidden;}
    .header{padding:14px 16px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;}
    .brand{display:flex;align-items:center;gap:9px;}
    .logo{width:26px;height:26px;background:#6d56fa;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
    .brand-name{font-size:14px;font-weight:600;letter-spacing:-.3px;}
    .brand-name span{color:#7c6af7;}
    .tab-bar{display:flex;gap:2px;}
    .tab{padding:4px 10px;font-size:11px;border-radius:5px;cursor:pointer;color:#666;border:none;background:transparent;}
    .tab.active{background:#1a1a1a;color:#e8e8e8;}
    .page{display:none;padding:14px 16px;}
    .page.active{display:block;}
    .status-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#111;border-radius:8px;margin-bottom:12px;}
    .dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0;}
    .dot.green{background:#4ade80;}
    .dot.red{background:#f87171;}
    .dot.amber{background:#fbbf24;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .status-text{font-size:12px;color:#888;}
    .steps{display:flex;align-items:center;margin-bottom:14px;gap:0;}
    .step{display:flex;flex-direction:column;align-items:center;flex:1;}
    .step-circle{width:24px;height:24px;border-radius:50%;border:1.5px solid #2a2a2a;display:flex;align-items:center;justify-content:center;font-size:10px;color:#555;background:#111;transition:all .3s;}
    .step-circle.done{background:#6d56fa;border-color:#6d56fa;color:#fff;}
    .step-circle.active{border-color:#6d56fa;color:#6d56fa;}
    .step-label{font-size:10px;color:#555;margin-top:4px;text-align:center;}
    .step-label.active{color:#aaa;}
    .step-line{height:1.5px;background:#1e1e1e;flex:1;margin-top:-12px;}
    .step-line.done{background:#6d56fa;}
    .btn{width:100%;padding:10px 16px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;margin-bottom:8px;}
    .btn-primary{background:#6d56fa;color:#fff;}
    .btn-primary:hover{background:#5b45e0;}
    .btn-primary:disabled{background:#1e1e1e;color:#444;cursor:not-allowed;}
    .btn-ghost{background:#111;color:#aaa;border:1px solid #1e1e1e;}
    .btn-ghost:hover{background:#181818;border-color:#2a2a2a;}
    .btn-ghost:disabled{opacity:.4;cursor:not-allowed;}
    .spinner{width:12px;height:12px;border:2px solid #ffffff30;border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .manifest-box{background:#111;border:1px solid #1e1e1e;border-radius:9px;padding:10px 12px;margin-bottom:10px;max-height:180px;overflow-y:auto;}
    .manifest-box::-webkit-scrollbar{width:3px;}
    .manifest-box::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}
    .m-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:11.5px;}
    .m-label{color:#555;min-width:70px;flex-shrink:0;}
    .m-value{color:#ccc;line-height:1.5;word-break:break-word;}
    .m-badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;background:#1e1e2e;color:#a78bfa;margin:1px 2px 1px 0;}
    .m-badge.error{background:#1e0a0a;color:#f87171;}
    .m-badge.file{background:#0a1e1a;color:#5DCAA5;}
    .log{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:8px 10px;font-size:11px;font-family:'SF Mono','Fira Code',monospace;color:#555;min-height:44px;max-height:80px;overflow-y:auto;margin-bottom:10px;line-height:1.7;}
    .log .ok{color:#4ade80;}
    .log .err{color:#f87171;}
    .log .info{color:#7c6af7;}
    .history-item{background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:10px 12px;margin-bottom:8px;transition:border-color .15s;}
    .history-item:hover{border-color:#2a2a2a;}
    .hi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
    .hi-name{font-size:12px;font-weight:500;color:#ccc;}
    .hi-time{font-size:10px;color:#444;}
    .hi-stack{font-size:10px;color:#666;}
    .hi-actions{display:flex;gap:6px;margin-top:8px;}
    .hi-btn{padding:3px 9px;border-radius:5px;font-size:10px;border:1px solid #2a2a2a;background:transparent;color:#888;cursor:pointer;}
    .hi-btn:hover{color:#ccc;border-color:#3a3a3a;}
    .empty-state{text-align:center;padding:24px;color:#444;font-size:12px;}
    .footer{padding:8px 16px;border-top:1px solid #111;display:flex;justify-content:space-between;align-items:center;}
    .footer-text{font-size:10px;color:#333;}
    .clear-btn{font-size:10px;color:#444;background:none;border:none;cursor:pointer;padding:2px 6px;}
    .clear-btn:hover{color:#888;}
  </style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="logo">R</div>
    <div class="brand-name">Relay<span>AI</span></div>
  </div>
  <div class="tab-bar">
    <button class="tab active" id="tab-transfer">Transfer</button>
    <button class="tab" id="tab-history">History</button>
  </div>
</div>

<div class="page active" id="page-transfer">
  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Checking page...</span>
  </div>
  <div class="steps">
    <div class="step">
      <div class="step-circle active" id="sc1">1</div>
      <div class="step-label active" id="sl1">Capture</div>
    </div>
    <div class="step-line" id="line1"></div>
    <div class="step">
      <div class="step-circle" id="sc2">2</div>
      <div class="step-label" id="sl2">Parse</div>
    </div>
    <div class="step-line" id="line2"></div>
    <div class="step">
      <div class="step-circle" id="sc3">3</div>
      <div class="step-label" id="sl3">Transfer</div>
    </div>
  </div>
  <div id="targetSelector" style="margin-bottom:10px;"></div>
  <button class="btn btn-primary" id="captureBtn" disabled>
    <span id="captureBtnContent">Capture Context</span>
  </button>
  <div id="manifestPreview" style="display:none;">
    <div class="manifest-box" id="manifestBox"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <button class="btn btn-ghost" id="copyBtn" style="margin-bottom:0;flex:1;font-size:12px;padding:8px;">Copy Manifest</button>
    </div>
    <button class="btn btn-primary" id="transferBtn">
      <span id="transferBtnContent">Transfer to Claude</span>
    </button>
  </div>
  <div class="log" id="logBox"><span class="info">Ready.</span></div>
</div>

<div class="page" id="page-history">
  <div id="historyList"></div>
</div>

<div class="footer">
  <span class="footer-text">RelayAI v2.0</span>
  <button class="clear-btn" id="clearHistoryBtn">Clear history</button>
</div>

<script src="popup.js"></script>
</body>
</html>
